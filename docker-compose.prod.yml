services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-mantis}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: "no"
    entrypoint: ["/usr/local/bin/goose", "-dir", "/migrations", "postgres", "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-mantis}?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-mantis}?sslmode=disable"
      PORT: "8080"
      ATTACHMENT_DIR: /data/attachments
      AUTH_TOKEN: "${AUTH_TOKEN:-}"
      AUTH_USER_NAME: "${AUTH_USER_NAME:-admin}"
      AUTH_RATE_LIMIT_MAX: "${AUTH_RATE_LIMIT_MAX:-}"
      AUTH_RATE_LIMIT_WINDOW: "${AUTH_RATE_LIMIT_WINDOW:-}"
      ASR_API_URL: "${ASR_API_URL:-}"
      OCR_API_URL: "${OCR_API_URL:-}"
      TTS_API_URL: "${TTS_API_URL:-}"
      MANTIS_SUPERVISOR_MAX_ITERATIONS: "${MANTIS_SUPERVISOR_MAX_ITERATIONS:-}"
      MANTIS_SUPERVISOR_TIMEOUT: "${MANTIS_SUPERVISOR_TIMEOUT:-}"
      MANTIS_SERVER_MAX_ITERATIONS: "${MANTIS_SERVER_MAX_ITERATIONS:-}"
      MANTIS_SERVER_TIMEOUT: "${MANTIS_SERVER_TIMEOUT:-}"
      MANTIS_PLAN_STEP_TIMEOUT: "${MANTIS_PLAN_STEP_TIMEOUT:-}"
    volumes:
      - attachments:/data/attachments
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_LLM_BASE_URL: "${VITE_LLM_BASE_URL:-}"
        VITE_LLM_API_KEY: "${VITE_LLM_API_KEY:-}"
        VITE_LLM_MODEL: "${VITE_LLM_MODEL:-}"
        VITE_TG_BOT_TOKEN: "${VITE_TG_BOT_TOKEN:-}"
        VITE_TG_USER_IDS: "${VITE_TG_USER_IDS:-}"
    restart: unless-stopped
    ports:
      - "${MANTIS_PORT:-8080}:80"
    depends_on:
      - app

  sandbox:
    build: sandboxes/base
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      USER_NAME: mantis
      USER_PASSWORD: "${SANDBOX_PASSWORD:-mantis}"
      PASSWORD_ACCESS: "true"

  browser-sandbox:
    build: sandboxes/browser
    restart: unless-stopped
    environment:
      ASR_API_URL: "${ASR_API_URL:-}"
      OCR_API_URL: "${OCR_API_URL:-}"

  ffmpeg-sandbox:
    build: sandboxes/ffmpeg
    restart: unless-stopped

  python-sandbox:
    build: sandboxes/python
    restart: unless-stopped

  db-sandbox:
    build: sandboxes/db
    restart: unless-stopped

  netsec-sandbox:
    build: sandboxes/netsec
    restart: unless-stopped

volumes:
  pgdata:
  attachments:
