# Sample Secret for prod. Ship via CI Secure Files → templates/secrets.yaml,
# or pre-create in cluster and pass --set global.secretName=<name>.
apiVersion: v1
kind: Secret
metadata:
  name: mantis-secrets
  labels:
    app.kubernetes.io/name: mantis
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  POSTGRES_USER: "mantis"
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_DB: "mantis"
  AUTH_TOKEN: "CHANGE_ME"
  GONKA_PRIVATE_KEY: ""
