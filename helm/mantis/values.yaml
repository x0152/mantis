global:
  namespace: mantis
  imagePullSecrets: []

# ===========================================
# Ingress — routes /api to app, everything else to frontend
# ===========================================
ingress:
  enabled: true
  host: mantis.example.com
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  tls: []
  # - secretName: mantis-tls
  #   hosts:
  #     - mantis.example.com

# ===========================================
# Backend (Go)
# ===========================================
app:
  enabled: true
  replicaCount: 1
  port: 8080
  image:
    repository: mantis
    tag: latest
    pullPolicy: IfNotPresent
  env:
    AUTH_TOKEN: ""
    AUTH_USER_NAME: "admin"
    AUTH_RATE_LIMIT_MAX: "5"
    AUTH_RATE_LIMIT_WINDOW: "15m"
    ASR_API_URL: ""
    OCR_API_URL: ""
    TTS_API_URL: ""
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: 1000m
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  attachments:
    storage: 20Gi
    storageClassName: ""

# ===========================================
# Frontend (nginx + built SPA)
# ===========================================
frontend:
  enabled: true
  replicaCount: 1
  port: 80
  image:
    repository: mantis-frontend
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

# ===========================================
# PostgreSQL (simple single-node deployment)
# ===========================================
postgres:
  enabled: true
  image: postgres:17-alpine
  port: 5432
  storage: 20Gi
  storageClassName: ""
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 1000m

# ===========================================
# DB migration job (goose)
# ===========================================
migration:
  enabled: true

# ===========================================
# Secrets (base64 in template, plain text here)
# ===========================================
secrets:
  postgres:
    user: postgres
    password: postgres
    db: mantis

# ===========================================
# Runtime — the app provisions sandbox containers itself by writing
# Dockerfiles into the connections table on startup. For that to work
# the app pod needs Docker access on its node (hostPath mount on a
# DinD/containerd-hosted cluster, or equivalent). This chart does NOT
# ship per-sandbox Deployments anymore.
# ===========================================
runtime:
  dockerSocket: /var/run/docker.sock
