global:
  nameOverride: ""
  fullnameOverride: ""
  timezone: "UTC"
  secretName: ""
  configName: ""
  imagePullSecrets: []

config:
  app:
    port: "8080"
    attachmentDir: "/data/attachments"
  postgres:
    # empty + postgres.enabled=true → falls back to in-cluster postgres Service
    host: ""
    port: ""
    sslmode: "disable"
  auth:
    userName: "admin"
    rateLimitMax: "5"
    rateLimitWindow: "15m"
  asr:
    apiUrl: ""
  ocr:
    apiUrl: ""
  tts:
    apiUrl: ""
  gonka:
    defaultNodeUrl: "http://node1.gonka.ai:8000"
    nodeUrl: ""

app:
  enabled: true
  replicaCount: 1
  port: 8080
  image:
    repository: mantis
    tag: latest
    pullPolicy: IfNotPresent
  extraEnv: []
  resources:
    requests:
      memory: 256Mi
      cpu: 200m
    limits:
      memory: 1Gi
      cpu: 1000m
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  attachments:
    storage: 20Gi
    storageClassName: ""

frontend:
  enabled: true
  replicaCount: 1
  port: 80
  image:
    repository: mantis-frontend
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

postgres:
  enabled: true
  image: postgres:17-alpine
  port: 5432
  storage: 20Gi
  storageClassName: ""
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 1Gi
      cpu: 1000m

migration:
  enabled: true
  backoffLimit: 3
  resources:
    requests:
      memory: 128Mi
      cpu: 100m
    limits:
      memory: 256Mi
      cpu: 200m

ingress:
  enabled: true
  host: mantis.example.com
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10g"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  certManagerIssuer: ""
  tls: []

secrets:
  postgres:
    user: postgres
    password: postgres
    db: mantis
  authToken: ""
  gonkaPrivateKey: ""

# dind requires privileged pods; switch to hostSocket on k3s/kind/dev VMs.
runtime:
  mode: dind
  dockerSocket: /var/run/docker.sock
  network: mantis-sandbox-net
  sandboxCaps: "NET_RAW,NET_ADMIN"
  apiToken: ""
  dind:
    image: docker:24-dind
    storage:
      enabled: true
      size: 30Gi
      storageClassName: ""
    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 4Gi
        cpu: 2000m
