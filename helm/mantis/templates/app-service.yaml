{{- if .Values.app.enabled }}
apiVersion: v1
kind: Service
metadata:
  # name fixed at `app` — frontend nginx proxies /api/ → http://app:8080
  name: app
  labels:
    {{- include "mantis.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.app.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "mantis.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
{{- end }}
