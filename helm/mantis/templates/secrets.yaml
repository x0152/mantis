{{- if not .Values.global.secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mantis.secretName" . }}
  labels:
    {{- include "mantis.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.secrets.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.secrets.postgres.db | quote }}
  AUTH_TOKEN: {{ .Values.secrets.authToken | quote }}
  GONKA_PRIVATE_KEY: {{ .Values.secrets.gonkaPrivateKey | quote }}
{{- end }}
