{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  # tag in name keeps Jobs unique across upgrades (Jobs are immutable)
  name: {{ include "mantis.fullname" . }}-migrate-{{ .Values.app.image.tag | replace "." "-" | replace "+" "-" | replace "_" "-" | trunc 40 }}
  labels:
    {{- include "mantis.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        {{- include "mantis.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      {{- include "mantis.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image | quote }}
          command: ["sh", "-c"]
          args:
            - |
              until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER"; do
                echo "waiting for postgres..."
                sleep 2
              done
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "mantis.configName" . }}
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "mantis.configName" . }}
                  key: POSTGRES_PORT
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "mantis.secretName" . }}
                  key: POSTGRES_USER
      containers:
        - name: migrate
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          # migrations are baked at /migrations in Dockerfile.prod
          command: ["goose"]
          args:
            - "-dir"
            - "/migrations"
            - "postgres"
            - "$(DATABASE_URL)"
            - "up"
          env:
            {{- include "mantis.commonEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
{{- end }}
