{{- if .Values.app.enabled }}
{{- $mode := .Values.runtime.mode | default "dind" -}}
{{- $fullName := include "mantis.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-app
  labels:
    {{- include "mantis.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  {{- if not .Values.app.autoscaling.enabled }}
  replicas: {{ .Values.app.replicaCount }}
  {{- end }}
  strategy:
    {{- if eq $mode "dind" }}
    type: Recreate
    {{- else }}
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
    {{- end }}
  selector:
    matchLabels:
      {{- include "mantis.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        {{- include "mantis.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      {{- include "mantis.imagePullSecrets" . | nindent 6 }}
      {{- if eq $mode "dind" }}
      # dind socket is owned by root; app must read it.
      securityContext:
        runAsUser: 0
      {{- end }}
      initContainers:
        - name: wait-for-postgres
          image: {{ .Values.postgres.image | quote }}
          command: ["sh", "-c"]
          args:
            - |
              until pg_isready -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER"; do
                echo "waiting for postgres..."
                sleep 2
              done
              export PGPASSWORD="$POSTGRES_PASSWORD"
              until [ "$(psql -h "$POSTGRES_HOST" -p "$POSTGRES_PORT" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc "SELECT to_regclass('public.goose_db_version') IS NOT NULL" 2>/dev/null)" = "t" ]; do
                echo "waiting for migrations..."
                sleep 3
              done
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "mantis.configName" . }}
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "mantis.configName" . }}
                  key: POSTGRES_PORT
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "mantis.secretName" . }}
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mantis.secretName" . }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "mantis.secretName" . }}
                  key: POSTGRES_DB
      containers:
        - name: app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          {{- if eq $mode "dind" }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              for i in $(seq 1 120); do
                if [ -S "{{ .Values.runtime.dockerSocket }}" ]; then
                  exec /usr/local/bin/mantis
                fi
                sleep 1
              done
              echo "docker socket did not appear in time" >&2
              exit 1
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          env:
            {{- include "mantis.commonEnv" . | nindent 12 }}
            - name: RUNTIME_MODE
              value: docker
            - name: DOCKER_SOCKET
              value: {{ .Values.runtime.dockerSocket | quote }}
            - name: RUNTIME_NETWORK
              value: {{ .Values.runtime.network | default "mantis-sandbox-net" | quote }}
            - name: RUNTIME_SANDBOX_CAPS
              value: {{ .Values.runtime.sandboxCaps | default "NET_RAW,NET_ADMIN" | quote }}
            {{- with .Values.runtime.apiToken }}
            - name: RUNTIME_API_TOKEN
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.app.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: attachments
              mountPath: /data/attachments
            - name: docker-socket
              {{- if eq $mode "dind" }}
              mountPath: /var/run
              {{- else }}
              mountPath: {{ .Values.runtime.dockerSocket }}
              {{- end }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
        {{- if eq $mode "dind" }}
        - name: dind
          image: {{ .Values.runtime.dind.image | quote }}
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          args:
            - --host=unix:///var/run/docker.sock
            - --storage-driver=overlay2
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run
            - name: dind-storage
              mountPath: /var/lib/docker
          readinessProbe:
            exec:
              command: ["sh", "-c", "test -S /var/run/docker.sock && docker info >/dev/null 2>&1"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          resources:
            {{- toYaml .Values.runtime.dind.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: attachments
          persistentVolumeClaim:
            claimName: {{ $fullName }}-attachments
        {{- if eq $mode "dind" }}
        - name: docker-socket
          emptyDir: {}
        - name: dind-storage
          {{- if .Values.runtime.dind.storage.enabled }}
          persistentVolumeClaim:
            claimName: {{ $fullName }}-dind-storage
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- else }}
        - name: docker-socket
          hostPath:
            path: {{ .Values.runtime.dockerSocket }}
            type: Socket
        {{- end }}
{{- end }}
