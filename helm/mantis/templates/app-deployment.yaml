{{- if .Values.app.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mantis-app
  namespace: {{ include "mantis.namespace" . }}
  labels:
    app: mantis-app
    {{- include "mantis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: mantis-app
  template:
    metadata:
      labels:
        app: mantis-app
    spec:
      {{- include "mantis.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.app.port | quote }}
            - name: ATTACHMENT_DIR
              value: /data/attachments
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: { name: mantis-secrets, key: postgres-user }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: mantis-secrets, key: postgres-password }
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef: { name: mantis-secrets, key: postgres-db }
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:{{ .Values.postgres.port }}/$(POSTGRES_DB)?sslmode=disable"
            - name: RUNTIME_MODE
              value: docker
            - name: DOCKER_SOCKET
              value: {{ .Values.runtime.dockerSocket | quote }}
            {{- range $k, $v := .Values.app.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          volumeMounts:
            - name: attachments
              mountPath: /data/attachments
            - name: docker-socket
              mountPath: {{ .Values.runtime.dockerSocket }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
      volumes:
        - name: attachments
          persistentVolumeClaim:
            claimName: mantis-attachments
        - name: docker-socket
          hostPath:
            path: {{ .Values.runtime.dockerSocket }}
            type: Socket
{{- end }}
