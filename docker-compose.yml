services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mantis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10

  migrate:
    build: .
    entrypoint: ["goose", "-dir", "/app/migrations", "postgres", "postgres://postgres:postgres@postgres:5432/mantis?sslmode=disable", "up"]
    working_dir: /app
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    ports:
      - "${MANTIS_BACKEND_PORT:-27480}:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mantis?sslmode=disable
      PORT: "8080"
      ATTACHMENT_DIR: /data/attachments
      AUTH_TOKEN: "${AUTH_TOKEN:-}"
      AUTH_USER_NAME: "${AUTH_USER_NAME:-admin}"
      AUTH_RATE_LIMIT_MAX: "${AUTH_RATE_LIMIT_MAX:-}"
      AUTH_RATE_LIMIT_WINDOW: "${AUTH_RATE_LIMIT_WINDOW:-}"
      ASR_API_URL: "${ASR_API_URL:-}"
      OCR_API_URL: "${OCR_API_URL:-}"
      TTS_API_URL: "${TTS_API_URL:-}"
      MANTIS_SUPERVISOR_MAX_ITERATIONS: "${MANTIS_SUPERVISOR_MAX_ITERATIONS:-}"
      MANTIS_SUPERVISOR_TIMEOUT: "${MANTIS_SUPERVISOR_TIMEOUT:-}"
      MANTIS_SERVER_MAX_ITERATIONS: "${MANTIS_SERVER_MAX_ITERATIONS:-}"
      MANTIS_SERVER_TIMEOUT: "${MANTIS_SERVER_TIMEOUT:-}"
      MANTIS_PLAN_STEP_TIMEOUT: "${MANTIS_PLAN_STEP_TIMEOUT:-}"
      RUNTIME_MODE: "${RUNTIME_MODE:-docker}"
      RUNTIME_NETWORK: "${RUNTIME_NETWORK:-mantis-sandbox-net}"
      RUNTIME_API_TOKEN: "${RUNTIME_API_TOKEN:-}"
      DOCKER_SOCKET: /var/run/docker.sock
      GOFLAGS: "-buildvcs=false"
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - attachments:/data/attachments
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - default
      - sandbox
    working_dir: /app
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    build: frontend
    ports:
      - "${MANTIS_FRONTEND_PORT:-27173}:5173"
    environment:
      API_URL: http://app:8080
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_LLM_BASE_URL: "${VITE_LLM_BASE_URL:-}"
      VITE_LLM_API_KEY: "${VITE_LLM_API_KEY:-}"
      VITE_LLM_MODEL: "${VITE_LLM_MODEL:-}"
      VITE_TG_BOT_TOKEN: "${VITE_TG_BOT_TOKEN:-}"
      VITE_TG_USER_IDS: "${VITE_TG_USER_IDS:-}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./.env:/.env:ro
    depends_on:
      - app

volumes:
  pgdata:
  attachments:
  go-mod-cache:
  go-build-cache:

networks:
  default:
  sandbox:
    name: mantis-sandbox-net
