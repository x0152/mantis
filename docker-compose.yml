services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mantis
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10

  migrate:
    build: .
    entrypoint: ["/goose", "-dir", "/migrations", "postgres", "postgres://postgres:postgres@postgres:5432/mantis?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    ports:
      - "${MANTIS_BACKEND_PORT:-27480}:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mantis?sslmode=disable
      PORT: "8080"
      CRON_DELIVERY_CHANNEL: "${CRON_DELIVERY_CHANNEL:-}"
      ASR_API_URL: "${ASR_API_URL:-}"
      OCR_API_URL: "${OCR_API_URL:-}"
      TTS_API_URL: "${TTS_API_URL:-}"
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    build: frontend
    ports:
      - "${MANTIS_FRONTEND_PORT:-27173}:5173"
    environment:
      API_URL: http://app:8080
      VITE_LLM_BASE_URL: "${VITE_LLM_BASE_URL:-}"
      VITE_LLM_API_KEY: "${VITE_LLM_API_KEY:-}"
      VITE_LLM_MODEL: "${VITE_LLM_MODEL:-}"
      VITE_TG_BOT_TOKEN: "${VITE_TG_BOT_TOKEN:-}"
      VITE_TG_USER_IDS: "${VITE_TG_USER_IDS:-}"
    depends_on:
      - app

  sandbox:
    build: sandboxes/base
    environment:
      PUID: 1000
      PGID: 1000
      USER_NAME: mantis
      USER_PASSWORD: mantis
      PASSWORD_ACCESS: "true"
  browser-sandbox:
    build: sandboxes/browser
    environment:
      ASR_API_URL: "${ASR_API_URL:-}"
      OCR_API_URL: "${OCR_API_URL:-}"
  ffmpeg-sandbox:
    build: sandboxes/ffmpeg

  python-sandbox:
    build: sandboxes/python

  db-sandbox:
    build: sandboxes/db

volumes:
  pgdata:
